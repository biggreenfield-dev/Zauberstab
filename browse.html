let activeFilter = 'Alle';

function loadIdeas() {
  buildFilters();
  renderIdeas();
}

function buildFilters() {
  const cats = new Map();
  cats.set('Alle', allIdeas.length);
  allIdeas.forEach(i => {
    cats.set(i.kategorie, (cats.get(i.kategorie) || 0) + 1);
  });

  const container = document.getElementById('filterBtns');
  container.style.display = 'flex';
  container.style.gap = '6px';
  container.style.flexWrap = 'wrap';

  cats.forEach((count, cat) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'Alle' ? ' active' : '');
    btn.textContent = cat + ' (' + count + ')';
    btn.onclick = () => {
      activeFilter = cat;
      container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderIdeas();
    };
    container.appendChild(btn);
  });
}

function getScoreClass(score) {
  if (score >= 7) return 'high';
  if (score >= 5) return 'mid';
  return 'low';
}

function renderIdeas() {
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;

  let filtered = allIdeas.filter(i => {
    if (activeFilter !== 'Alle' && i.kategorie !== activeFilter) return false;
    if (search && !i.name.toLowerCase().includes(search) && !i.einzeiler.toLowerCase().includes(search) && !i.kategorie.toLowerCase().includes(search)) return false;
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    switch (sort) {
      case 'score-desc': return b.score - a.score;
      case 'score-asc': return a.score - b.score;
      case 'date-desc': return b.file.localeCompare(a.file);
      case 'date-asc': return a.file.localeCompare(b.file);
      case 'name-asc': return a.name.localeCompare(b.name);
      default: return 0;
    }
  });

  // Stats
  document.getElementById('resultCount').textContent = filtered.length + ' Idee' + (filtered.length !== 1 ? 'n' : '');
  if (filtered.length > 0) {
    const avg = (filtered.reduce((sum, i) => sum + i.score, 0) / filtered.length).toFixed(1);
    document.getElementById('avgScore').textContent = 'Ø Score: ' + avg;
  } else {
    document.getElementById('avgScore').textContent = '';
  }

  const grid = document.getElementById('ideasGrid');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>Keine Ideen gefunden. Versuche einen anderen Suchbegriff.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(idea => {
    const sc = getScoreClass(idea.score);
    const scoreKeys = ['suchvolumen', 'wachstum', 'schmerzlevel', 'machbarkeit', 'umsatzpotenzial'];
    const bars = scoreKeys.map(k => {
      const v = idea.scores[k] || 5;
      const h = Math.max(4, v * 2);
      const cls = v >= 7 ? 'high' : v >= 5 ? 'mid' : 'low';
      return '<div class="idea-card-bar ' + cls + '" style="height:' + h + 'px" title="' + k + ': ' + v + '"></div>';
    }).join('');

    return '<div class="idea-card" onclick="location.href=\'idee.html?id=' + idea.slug + '\'">' +
      '<div class="idea-card-top">' +
        '<span class="idea-card-category">' + idea.kategorie + '</span>' +
        '<div class="idea-card-score score-' + sc + '">' + idea.score + '</div>' +
      '</div>' +
      '<h3>' + idea.name + '</h3>' +
      '<div class="idea-card-desc">' + idea.einzeiler + '</div>' +
      '<div class="idea-card-meta">' +
        '<span class="idea-card-date">' + idea.date + '</span>' +
        '<div class="idea-card-bars">' + bars + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

document.getElementById('searchBox').addEventListener('input', renderIdeas);
document.getElementById('sortSelect').addEventListener('change', renderIdeas);

loadIdeas();

// ── Wand hover sparks (logo) ──
(function() {
  const logoIcon = document.querySelector('.logo-icon');
  if (!logoIcon) return;
  let sparkInterval = null;

  function emitSpark() {
    const spark = document.createElement('div');
    spark.className = 'logo-spark';
    spark.style.left = (8 + Math.random() * 4) + 'px';
    spark.style.top = (20 + Math.random() * 4) + 'px';
    spark.style.width = (1.5 + Math.random() * 2) + 'px';
    spark.style.height = spark.style.width;
    const angle = Math.random() * Math.PI * 2;
    const speed = 15 + Math.random() * 10;
    const dx = Math.cos(angle) * speed;
    const dy = Math.sin(angle) * speed;
    logoIcon.appendChild(spark);
    spark.animate([
      { opacity: 0.9, transform: 'translate(0,0) scale(1)', offset: 0 },
      { opacity: 0.6, transform: 'translate(' + dx*0.4 + 'px,' + dy*0.4 + 'px) scale(1.1)', offset: 0.3 },
      { opacity: 0, transform: 'translate(' + dx + 'px,' + dy + 'px) scale(0)', offset: 1 }
    ], { duration: 400 + Math.random() * 300, easing: 'cubic-bezier(0.2,0,0.38,0.9)', fill: 'forwards' }).onfinish = () => spark.remove();
  }

  logoIcon.addEventListener('mouseenter', () => {
    for (let i = 0; i < 5; i++) setTimeout(() => emitSpark(), i * 40);
    sparkInterval = setInterval(emitSpark, 80);
  });
  logoIcon.addEventListener('mouseleave', () => { clearInterval(sparkInterval); });
})();

// ── Sparkle background ──
(function() {
  const canvas = document.getElementById('sparkle-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];
  const COUNT = 50;
  const spawnPoints = [];
  for (let i = 0; i < 8; i++) spawnPoints.push({ x: Math.random() * 1920, y: Math.random() * 1080 });

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    spawnPoints.forEach(sp => { sp.x = Math.random() * w; sp.y = Math.random() * h; });
  }
  resize();
  window.addEventListener('resize', resize);

  class Spark {
    constructor() { this.reset(true); }
    reset(init) {
      const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
      this.x = sp.x + (Math.random() - 0.5) * 200;
      this.y = sp.y + (Math.random() - 0.5) * 200;
      const a = Math.random() * Math.PI * 2;
      const s = 0.08 + Math.random() * 0.3;
      this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
      this.friction = 0.997 + Math.random() * 0.002;
      this.gravity = 0.0005 + Math.random() * 0.001;
      this.size = 0.4 + Math.random() * 1.2;
      this.opacity = 0;
      this.maxOpacity = 0.15 + Math.random() * 0.3;
      this.life = 0;
      this.maxLife = 200 + Math.random() * 400;
      this.twinkle = 0.03 + Math.random() * 0.06;
      this.phase = Math.random() * Math.PI * 2;
    }
    update() {
      this.life++;
      this.vx *= this.friction; this.vy *= this.friction; this.vy += this.gravity;
      this.x += this.vx; this.y += this.vy;
      const fi = this.maxLife * 0.25, fo = this.maxLife * 0.4;
      if (this.life < fi) this.opacity = (this.life / fi) * this.maxOpacity;
      else if (this.life > this.maxLife - fo) this.opacity = ((this.maxLife - this.life) / fo) * this.maxOpacity;
      else this.opacity = this.maxOpacity;
      this.opacity *= 0.7 + 0.3 * Math.sin(this.life * this.twinkle + this.phase);
      if (this.life >= this.maxLife) this.reset(false);
    }
    draw() {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + this.opacity + ')'; ctx.fill();
      if (this.opacity > 0.12) {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(250,250,250,' + (this.opacity * 0.06) + ')'; ctx.fill();
      }
      if (this.opacity > 0.2 && this.size > 0.9) {
        const l = this.size * 2.5;
        ctx.strokeStyle = 'rgba(255,255,255,' + (this.opacity * 0.25) + ')'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(this.x-l, this.y); ctx.lineTo(this.x+l, this.y);
        ctx.moveTo(this.x, this.y-l); ctx.lineTo(this.x, this.y+l); ctx.stroke();
      }
    }
  }

  for (let i = 0; i < COUNT; i++) particles.push(new Spark());
  let fc = 0;
  function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    fc++; if (fc % 60 === 0) spawnPoints.forEach(sp => { sp.x += (Math.random()-0.5)*2; sp.y += (Math.random()-0.5)*2; });
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
